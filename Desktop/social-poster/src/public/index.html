<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Poster — AI Facebook Content Studio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --bg:           #f0f2f8;
      --surface:      #ffffff;
      --surface2:     #f8f9fc;
      --border:       #e4e8f0;
      --primary:      #1877f2;
      --primary-h:    #0d65d9;
      --primary-glow: rgba(24,119,242,0.18);
      --accent:       #7c3aed;
      --accent-h:     #6d28d9;
      --success:      #059669;
      --success-h:    #047857;
      --danger:       #dc2626;
      --text:         #0f172a;
      --text-2:       #334155;
      --text-muted:   #64748b;
      --radius:       16px;
      --radius-sm:    10px;
      --shadow:       0 4px 24px rgba(15,23,42,.07);
      --shadow-lg:    0 8px 40px rgba(15,23,42,.13);
    }

    [data-theme="dark"] {
      --bg:           #080c14;
      --surface:      #111827;
      --surface2:     #1a2133;
      --border:       #1e2d45;
      --primary-glow: rgba(24,119,242,0.12);
      --text:         #f1f5f9;
      --text-2:       #cbd5e1;
      --text-muted:   #64748b;
      --shadow:       0 4px 24px rgba(0,0,0,.4);
      --shadow-lg:    0 8px 40px rgba(0,0,0,.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background .25s, color .25s;
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 28px 20px;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 4px 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .brand-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #1877f2, #7c3aed);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .brand-icon svg { width: 22px; height: 22px; }
    .brand-name { font-size: 1.1rem; font-weight: 800; letter-spacing: -.3px; }
    .brand-name span { color: var(--primary); }

    .nav-label {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      padding: 0 8px;
      margin-bottom: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      font-size: .9rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .15s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      margin-bottom: 2px;
    }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--primary-glow); color: var(--primary); font-weight: 600; }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    #theme-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: none;
      background: none;
      color: var(--text-muted);
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }
    #theme-btn:hover { background: var(--surface2); color: var(--text); }
    #theme-btn svg { width: 18px; height: 18px; }

    /* ── Main ── */
    .main {
      padding: 36px 40px;
      max-width: 820px;
    }

    .page-header {
      margin-bottom: 32px;
    }
    .page-header h2 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -.5px;
      margin-bottom: 6px;
    }
    .page-header p {
      font-size: .95rem;
      color: var(--text-muted);
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      transition: box-shadow .2s;
    }
    .card:hover { box-shadow: var(--shadow-lg); }
    .card-title {
      font-size: .8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    /* ── Mode Toggle ── */
    .mode-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 24px;
    }
    .mode-btn {
      padding: 10px 16px;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: var(--text-muted);
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .mode-btn.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 6px rgba(0,0,0,.1);
    }
    .mode-btn svg { width: 15px; height: 15px; }

    /* ── Form ── */
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 8px;
      letter-spacing: .1px;
    }

    .input-wrap { position: relative; }
    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 17px; height: 17px;
      color: var(--text-muted);
      pointer-events: none;
    }

    input[type="text"], input[type="url"], textarea {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface2);
      color: var(--text);
      font-size: .95rem;
      font-family: inherit;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input[type="text"]:focus,
    input[type="url"]:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
      background: var(--surface);
    }
    textarea {
      padding: 14px;
      resize: vertical;
      min-height: 160px;
      line-height: 1.65;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: .92rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
      letter-spacing: .1px;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn svg { width: 17px; height: 17px; }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #2563eb);
      color: #fff;
      box-shadow: 0 2px 12px rgba(24,119,242,.35);
    }
    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(135deg, var(--primary-h), #1d4ed8);
      box-shadow: 0 4px 20px rgba(24,119,242,.45);
      transform: translateY(-1px);
    }

    .btn-accent {
      background: linear-gradient(135deg, var(--accent), #6d28d9);
      color: #fff;
      box-shadow: 0 2px 12px rgba(124,58,237,.35);
    }
    .btn-accent:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(124,58,237,.45);
    }

    .btn-success {
      background: linear-gradient(135deg, var(--success), #047857);
      color: #fff;
      box-shadow: 0 2px 12px rgba(5,150,105,.3);
    }
    .btn-success:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(5,150,105,.4);
    }

    .btn-ghost {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      color: var(--text-2);
    }
    .btn-ghost:hover:not(:disabled) {
      background: var(--border);
      color: var(--text);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .btn-row .btn-primary,
    .btn-row .btn-accent { flex: 1; }

    /* ── Preview ── */
    #preview { display: none; }
    #preview.visible { display: block; }

    .preview-img-wrap {
      position: relative;
      border-radius: var(--radius-sm);
      overflow: hidden;
      margin-bottom: 20px;
    }
    #preview-img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
    }
    .preview-img-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.5) 0%, transparent 50%);
      display: flex;
      align-items: flex-end;
      padding: 16px;
    }
    .preview-img-badge {
      background: rgba(255,255,255,.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.2);
      color: #fff;
      font-size: .78rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .caption-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .caption-header label {
      font-size: .82rem;
      font-weight: 600;
      color: var(--text-2);
    }
    .char-badge {
      font-size: .75rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* ── History ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -.2px;
    }
    .section-badge {
      font-size: .75rem;
      font-weight: 600;
      background: var(--primary-glow);
      color: var(--primary);
      padding: 3px 10px;
      border-radius: 20px;
    }

    #history-list { display: flex; flex-direction: column; gap: 12px; }

    .history-item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface2);
      transition: border-color .15s, box-shadow .15s;
    }
    .history-item:hover {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    .history-thumb {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
    }
    .history-meta { flex: 1; min-width: 0; }
    .history-caption {
      font-size: .88rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }
    .history-footer {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .history-link {
      font-size: .78rem;
      font-weight: 600;
      color: var(--primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .history-link:hover { text-decoration: underline; }
    .history-time {
      font-size: .75rem;
      color: var(--text-muted);
    }

    #no-history {
      text-align: center;
      padding: 40px 0;
      color: var(--text-muted);
      font-size: .9rem;
    }
    #no-history svg {
      width: 40px; height: 40px;
      margin: 0 auto 12px;
      display: block;
      opacity: .3;
    }

    /* ── Stats strip ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 18px 20px;
      box-shadow: var(--shadow);
    }
    .stat-value {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -.5px;
      margin-bottom: 2px;
    }
    .stat-label {
      font-size: .78rem;
      font-weight: 500;
      color: var(--text-muted);
    }
    .stat-card:nth-child(1) .stat-value { color: var(--primary); }
    .stat-card:nth-child(2) .stat-value { color: var(--accent); }
    .stat-card:nth-child(3) .stat-value { color: var(--success); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--text);
      color: var(--surface);
      padding: 13px 24px;
      border-radius: 40px;
      font-size: .88rem;
      font-weight: 600;
      box-shadow: 0 8px 32px rgba(0,0,0,.25);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      z-index: 1000;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { background: var(--success); color: #fff; }
    #toast.error   { background: var(--danger); color: #fff; }

    /* ── Spinner ── */
    .spinner {
      width: 17px; height: 17px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
      flex-shrink: 0;
    }
    .spinning .spinner { display: inline-block; }
    .spinning .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .main { padding: 24px 20px; max-width: 100%; }
      .stats { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 480px) {
      .stats { grid-template-columns: 1fr; }
      .btn-row .btn-primary,
      .btn-row .btn-accent { flex: none; width: 100%; }
    }
  </style>
</head>
<body>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
      </div>
      <div class="brand-name">Social<span>Poster</span></div>
    </div>

    <div class="nav-label">Menu</div>
    <button class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </button>
    <button class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Posts History
    </button>
    <button class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      Facebook Page
    </button>

    <div class="sidebar-footer">
      <button id="theme-btn">
        <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <span id="theme-label">Dark mode</span>
      </button>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main class="main">

    <div class="page-header">
      <h2>Create a Post</h2>
      <p>Generate AI-powered Facebook content from a topic or any article URL.</p>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Total Posts</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-today">0</div>
        <div class="stat-label">Posted Today</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-streak">0</div>
        <div class="stat-label">Day Streak</div>
      </div>
    </div>

    <!-- Generator -->
    <div class="card">
      <div class="card-title">New Post</div>

      <div class="mode-toggle">
        <button class="mode-btn active" data-tab="topic">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          Write a Topic
        </button>
        <button class="mode-btn" data-tab="url">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          From URL
        </button>
      </div>

      <div id="tab-topic" class="field">
        <label for="topic-input">What's the topic?</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="topic-input" type="text" placeholder="e.g. How AI is transforming healthcare in Africa" />
        </div>
      </div>

      <div id="tab-url" class="field" style="display:none">
        <label for="url-input">Article or page URL</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          <input id="url-input" type="url" placeholder="https://techcrunch.com/..." />
        </div>
      </div>

      <div class="btn-row">
        <button id="generate-btn" class="btn btn-accent">
          <span class="spinner"></span>
          <span class="btn-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            Generate Post
          </span>
        </button>
      </div>
    </div>

    <!-- Preview -->
    <div class="card" id="preview">
      <div class="card-title">Preview & Edit</div>

      <div class="preview-img-wrap">
        <img id="preview-img" src="" alt="Post image" />
        <div class="preview-img-overlay">
          <span class="preview-img-badge">📷 Unsplash</span>
        </div>
      </div>

      <div class="caption-header">
        <label for="caption-area">Caption <span style="font-weight:400;color:var(--text-muted)">(editable)</span></label>
        <span class="char-badge" id="char-count">0 chars</span>
      </div>
      <textarea id="caption-area" placeholder="Your AI-generated caption will appear here..."></textarea>

      <div class="btn-row">
        <button id="regenerate-btn" class="btn btn-ghost">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
          Regenerate
        </button>
        <button id="publish-btn" class="btn btn-success">
          <span class="spinner"></span>
          <span class="btn-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>
            Post to Facebook
          </span>
        </button>
      </div>
    </div>

    <!-- History -->
    <div class="card">
      <div class="section-header">
        <span class="section-title">Recent Posts</span>
        <span class="section-badge" id="history-badge">0 posts</span>
      </div>
      <div id="history-list">
        <div id="no-history">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          No posts yet. Generate your first one above.
        </div>
      </div>
    </div>

  </main>
</div>

<div id="toast"></div>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────
let currentImageUrl = '';
const history = JSON.parse(localStorage.getItem('sp_history') || '[]');

// ── DOM refs ───────────────────────────────────────────────────────────────
const generateBtn   = document.getElementById('generate-btn');
const regenerateBtn = document.getElementById('regenerate-btn');
const publishBtn    = document.getElementById('publish-btn');
const topicInput    = document.getElementById('topic-input');
const urlInput      = document.getElementById('url-input');
const captionArea   = document.getElementById('caption-area');
const previewCard   = document.getElementById('preview');
const previewImg    = document.getElementById('preview-img');
const charCount     = document.getElementById('char-count');
const historyList   = document.getElementById('history-list');
const noHistory     = document.getElementById('no-history');
const themeBtn      = document.getElementById('theme-btn');
const themeIcon     = document.getElementById('theme-icon');
const themeLabel    = document.getElementById('theme-label');

// ── Theme ──────────────────────────────────────────────────────────────────
const savedTheme = localStorage.getItem('sp_theme') || 'light';
applyTheme(savedTheme);

function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('sp_theme', t);
  if (t === 'dark') {
    themeIcon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
    themeLabel.textContent = 'Light mode';
  } else {
    themeIcon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    themeLabel.textContent = 'Dark mode';
  }
}

themeBtn.addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  applyTheme(current === 'dark' ? 'light' : 'dark');
});

// ── Mode Toggle ────────────────────────────────────────────────────────────
let activeTab = 'topic';
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeTab = btn.dataset.tab;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-topic').style.display = activeTab === 'topic' ? 'block' : 'none';
    document.getElementById('tab-url').style.display   = activeTab === 'url'   ? 'block' : 'none';
  });
});

// ── Caption char count ─────────────────────────────────────────────────────
captionArea.addEventListener('input', () => {
  charCount.textContent = captionArea.value.length + ' chars';
});

// ── Toast ──────────────────────────────────────────────────────────────────
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.className = ''; }, 3500);
}

// ── Spinner helpers ────────────────────────────────────────────────────────
function setLoading(btn, state) {
  btn.disabled = state;
  btn.classList.toggle('spinning', state);
}

// ── Generate ───────────────────────────────────────────────────────────────
async function generate() {
  const body = {};
  if (activeTab === 'topic') {
    const t = topicInput.value.trim();
    if (!t) { toast('Please enter a topic first.', 'error'); return; }
    body.topic = t;
  } else {
    const u = urlInput.value.trim();
    if (!u) { toast('Please paste a URL first.', 'error'); return; }
    body.url = u;
  }

  setLoading(generateBtn, true);
  previewCard.classList.remove('visible');

  try {
    const res  = await fetch('/api/generate', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Generation failed.');

    currentImageUrl = data.imageUrl;
    previewImg.src  = data.imageUrl;
    captionArea.value = data.caption;
    charCount.textContent = data.caption.length + ' chars';
    previewCard.classList.add('visible');
    previewCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
    toast('Content generated! Review and post when ready.', 'success');
  } catch (err) {
    toast(err.message, 'error');
  } finally {
    setLoading(generateBtn, false);
  }
}

generateBtn.addEventListener('click', generate);
regenerateBtn.addEventListener('click', generate);
topicInput.addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });
urlInput.addEventListener('keydown',   e => { if (e.key === 'Enter') generate(); });

// ── Publish ────────────────────────────────────────────────────────────────
publishBtn.addEventListener('click', async () => {
  const caption = captionArea.value.trim();
  if (!caption || !currentImageUrl) {
    toast('Nothing to post yet. Generate content first.', 'error');
    return;
  }

  setLoading(publishBtn, true);

  try {
    const res  = await fetch('/api/publish', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ caption, imageUrl: currentImageUrl }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Publish failed.');

    toast('Posted to Facebook!', 'success');
    addToHistory(caption, currentImageUrl, data.postUrl);
    previewCard.classList.remove('visible');
    captionArea.value = '';
    currentImageUrl   = '';
    updateStats();
  } catch (err) {
    toast(err.message, 'error');
  } finally {
    setLoading(publishBtn, false);
  }
});

// ── History ────────────────────────────────────────────────────────────────
function addToHistory(caption, imageUrl, postUrl) {
  history.unshift({ caption, imageUrl, postUrl, time: Date.now() });
  if (history.length > 20) history.pop();
  localStorage.setItem('sp_history', JSON.stringify(history));
  renderHistory();
}

function timeAgo(ts) {
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60)   return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderHistory() {
  document.getElementById('history-badge').textContent = history.length + ' post' + (history.length !== 1 ? 's' : '');
  if (history.length === 0) {
    noHistory.style.display = 'block';
    return;
  }
  noHistory.style.display = 'none';
  historyList.innerHTML = history.map(item => `
    <div class="history-item">
      <img class="history-thumb" src="${escapeHtml(item.imageUrl)}" alt="" />
      <div class="history-meta">
        <div class="history-caption">${escapeHtml(item.caption.slice(0, 110))}…</div>
        <div class="history-footer">
          <a class="history-link" href="${escapeHtml(item.postUrl)}" target="_blank" rel="noopener">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            View on Facebook
          </a>
          <span class="history-time">${timeAgo(item.time)}</span>
        </div>
      </div>
    </div>
  `).join('');
}

// ── Stats ──────────────────────────────────────────────────────────────────
function updateStats() {
  const total = history.length;
  const today = history.filter(p => {
    const d = new Date(p.time);
    const n = new Date();
    return d.toDateString() === n.toDateString();
  }).length;

  const days = new Set(history.map(p => new Date(p.time).toDateString()));
  const streak = days.size;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-today').textContent = today;
  document.getElementById('stat-streak').textContent = streak;
}

renderHistory();
updateStats();
</script>
</body>
</html>
